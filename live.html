<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BIGO Live | AliCreationBD</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e1b4b, #111827, #3b0764);
      color: white;
      text-align: center;
      padding: 20px;
    }

    .card {
      max-width: 650px;
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 24px;
      padding: 36px 24px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.28);
    }

    .badge {
      display: inline-block;
      background: #ff0050;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: bold;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 38px;
      margin-bottom: 12px;
    }

    p {
      color: #dbeafe;
      font-size: 17px;
      margin-bottom: 24px;
      line-height: 1.7;
    }

    .btn {
      display: inline-block;
      padding: 15px 28px;
      border-radius: 14px;
      background: linear-gradient(135deg, #ff0050, #ff7a00);
      color: white;
      font-weight: 700;
      text-decoration: none;
      margin: 8px;
    }

    .btn-back {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.18);
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 30px;
      }

      .btn {
        display: block;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">🔴 LIVE NOW</div>
    <h1>Join My BIGO Live</h1>
    <p>
      Click below to open my official BIGO profile and watch the live stream.
    </p>

    <a class="btn" href="https://www.bigo.tv/user/1103003504" target="_blank">🚀 Watch on BIGO</a>
    <a class="btn btn-back" href="index.html">← Back to Home</a>
  </div>
</body>
</html>
