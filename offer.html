<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Special Offer | AliCreationBD</title>

  <meta name="description" content="Claim your special offer now." />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top right, rgba(34,197,94,0.15), transparent 30%),
        radial-gradient(circle at bottom left, rgba(16,185,129,0.15), transparent 30%),
        linear-gradient(180deg, #07101e 0%, #0b1430 100%);
      color: #fff;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 700px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px 25px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 38px;
      margin-bottom: 15px;
    }

    p {
      color: #cbd5e1;
      font-size: 17px;
      margin-bottom: 25px;
      line-height: 1.6;
    }

    .offer-box {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.4);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 25px;
    }

    .offer-box strong {
      font-size: 20px;
      color: #4ade80;
    }

    .countdown {
      font-size: 28px;
      font-weight: bold;
      margin: 15px 0;
      color: #22c55e;
    }

    .btn {
      display: inline-block;
      padding: 16px 30px;
      border-radius: 14px;
      font-weight: bold;
      text-decoration: none;
      margin-top: 15px;
      transition: 0.3s;
    }

    .btn-offer {
      background: linear-gradient(135deg, #16a34a, #22c55e);
      color: #fff;
      box-shadow: 0 10px 25px rgba(34,197,94,0.3);
    }

    .btn-offer:hover {
      transform: translateY(-2px);
    }

    .btn-home {
      display: block;
      margin-top: 15px;
      color: #94a3b8;
      font-size: 14px;
    }

  </style>
</head>
<body>

  <div class="card">
    <h1>🎁 Special Offer</h1>

    <p>
      Click the button below to unlock your exclusive offer.
      Limited time only!
    </p>

    <div class="offer-box">
      <strong>🔥 Limited Offer Active</strong>
    </div>

    <div class="countdown" id="countdown">5</div>

    <a id="offerBtn" class="btn btn-offer" href="https://omg10.com/4/10758974" target="_blank">
      Continue to Offer
    </a>

    <a href="index.html" class="btn-home">← Back to Home</a>
  </div>

  <script>
    let time = 5;
    const countdown = document.getElementById("countdown");

    const timer = setInterval(() => {
      time--;
      countdown.innerText = time;

      if (time <= 0) {
        clearInterval(timer);
      }
    }, 1000);
  </script>

</body>
</html>
